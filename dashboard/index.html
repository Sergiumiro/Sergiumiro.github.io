<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kubernetes Cluster Dashboard</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <!-- Particle Background -->
    <div id="particle-canvas"></div>
    
    <!-- Main Layout -->
    <div class="app-container">
        <!-- Left Sidebar Menu -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2 class="logo">K8s<span class="accent">Dash</span></h2>
                <button class="toggle-sidebar" id="toggleSidebar" aria-label="Toggle sidebar">
                    <span class="hamburger"></span>
                </button>
            </div>
            
            <nav class="sidebar-nav">
                <ul class="nav-list">
                    <li class="nav-item">
                        <a href="#/" class="nav-link active" data-page="home">
                            <span class="nav-icon">🏠</span>
                            <span class="nav-text">Агенты</span>
                        </a>
                    </li>
                    <li class="nav-item nav-submenu">
                        <div class="nav-link submenu-toggle">
                            <span class="nav-icon">⚙️</span>
                            <span class="nav-text">Настройки</span>
                            <span class="nav-arrow">▼</span>
                        </div>
                        <ul class="submenu-list">
                            <li><a href="#/settings/gitops" class="submenu-link" data-page="gitops">GitOps</a></li>
                            <li><a href="#/settings/jenkins" class="submenu-link" data-page="jenkins">Jenkins</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a href="#/monitoring" class="nav-link" data-page="monitoring">
                            <span class="nav-icon">📊</span>
                            <span class="nav-text">Мониторинг</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#/settings" class="nav-link" data-page="settings">
                            <span class="nav-icon">🔧</span>
                            <span class="nav-text">Настройки</span>
                        </a>
                    </li>
                </ul>
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="avatar">A</div>
                    <span class="username">Admin</span>
                </div>
            </div>
        </aside>
        
        <!-- Main Content Area -->
        <main class="main-content" id="mainContent">
            <!-- Header with Search -->
            <header class="content-header">
                <div class="search-container">
                    <input 
                        type="text" 
                        class="search-input" 
                        id="searchInput"
                        placeholder="Поиск кластеров..."
                        autocomplete="off"
                    >
                    <div class="search-results" id="searchResults"></div>
                </div>
                <div class="header-actions">
                    <button class="btn-icon" id="refreshBtn" aria-label="Refresh">
                        🔄
                    </button>
                    <button class="btn-icon" id="notificationsBtn" aria-label="Notifications">
                        🔔
                        <span class="notification-badge">3</span>
                    </button>
                </div>
            </header>
            
            <!-- Page Container -->
            <div class="page-container" id="pageContainer">
                <!-- Content will be dynamically loaded here -->
            </div>
        </main>
    </div>
    
    <!-- Modal for JIRA Tickets -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h3 id="modalTitle">JIRA Ticket</h3>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Modal content -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="modalCancel">Закрыть</button>
                <button class="btn btn-primary" id="modalAction">Действие</button>
            </div>
        </div>
    </div>
    
    <!-- Audio Elements for Sound Effects -->
    <audio id="clickSound" preload="auto"></audio>
    
    <script type="module" src="js/app.js"></script>
</body>
</html>
