<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>План работ</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f1117;
  --surface: #181c24;
  --surface2: #1e2330;
  --border: #252a38;
  --border2: #2e3347;
  --accent: #6c63ff;
  --accent2: #8b85ff;
  --text: #e2e4ec;
  --muted: #6b7280;
  --danger: #ef4444;
  --green: #22c55e;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Inter', sans-serif;
}
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  gap: 16px;
}
.logo {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
}
.logo span { color: var(--accent); }
.header-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;
  justify-content: center;
  flex-wrap: wrap;
}
.meta-chip {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 3px 10px;
  border-radius: 20px;
  white-space: nowrap;
}
.meta-chip b { color: var(--accent2); }
.header-actions { display: flex; gap: 8px; }
.btn-copy {
  padding: 7px 16px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--sans);
  transition: background .2s;
  white-space: nowrap;
}
.btn-copy:hover { background: var(--accent2); }

/* ── MAIN SCROLL AREA ── */
main {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px 32px;
}

/* ── SECTION BLOCK ── */
.section-wrap {
  margin-bottom: 12px;
}
.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 14px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 8px 8px 0 0;
  cursor: pointer;
  user-select: none;
}
.section-header:hover { background: var(--surface2); }
.section-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.section-title {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: .02em;
  flex: 1;
}
.section-count {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  background: var(--bg);
  padding: 2px 7px;
  border-radius: 10px;
}
.section-chevron {
  font-size: 11px;
  color: var(--muted);
  transition: transform .2s;
}
.section-wrap.collapsed .section-chevron { transform: rotate(-90deg); }
.section-body {
  border: 1px solid var(--border2);
  border-top: none;
  border-radius: 0 0 8px 8px;
  overflow: hidden;
}
.section-wrap.collapsed .section-body { display: none; }

/* ── TABLE ── */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
thead th {
  background: var(--bg);
  padding: 7px 10px;
  text-align: left;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background .12s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(108,99,255,.04); }
td {
  padding: 8px 10px;
  vertical-align: middle;
  color: var(--text);
}
td.num {
  width: 36px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 11px;
  text-align: center;
}
td.task { min-width: 140px; font-weight: 500; }
td.datetime { white-space: nowrap; font-family: var(--mono); font-size: 11px; color: #9ca3af; width: 130px; }
td.resp { min-width: 100px; color: #a5b4fc; }
td.impact { width: 80px; }
td.comment { color: var(--muted); }
td.actions { width: 36px; text-align: center; padding: 4px; }

/* special cols for rollback/contacts/comms */
td.role { color: #a5b4fc; }
td.contact { font-family: var(--mono); font-size: 11px; }
td.event { font-weight: 500; }
td.comm-type { color: var(--muted); }

/* inline edit */
td[contenteditable="true"] {
  outline: none;
  background: rgba(108,99,255,.08);
  border-radius: 3px;
  cursor: text;
}
td[contenteditable="true"]:focus {
  background: rgba(108,99,255,.14);
  box-shadow: inset 0 0 0 1px var(--accent);
}

/* row drag */
tr.dragging { opacity: .4; }
tr.drag-over td { border-top: 2px solid var(--accent); }

/* row actions */
.row-del {
  width: 22px; height: 22px;
  border: none;
  background: transparent;
  color: var(--border2);
  cursor: pointer;
  border-radius: 4px;
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: background .12s, color .12s;
}
.row-del:hover { background: rgba(239,68,68,.12); color: var(--danger); }

/* add row button */
.btn-add-row {
  width: 100%;
  padding: 7px;
  background: transparent;
  border: none;
  border-top: 1px solid var(--border);
  color: var(--muted);
  font-size: 12px;
  cursor: pointer;
  font-family: var(--sans);
  transition: background .15s, color .15s;
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.btn-add-row:hover { background: rgba(108,99,255,.07); color: var(--accent2); }

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.7);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 28px 32px;
  width: 480px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  box-shadow: 0 24px 64px rgba(0,0,0,.5);
}
.modal-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
}
.modal-sub {
  font-size: 13px;
  color: var(--muted);
  margin-top: -8px;
}
.field { display: flex; flex-direction: column; gap: 5px; }
.field label {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .06em;
  font-family: var(--mono);
}
.field input, .field select {
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 7px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  padding: 9px 12px;
  outline: none;
  transition: border-color .2s;
}
.field input:focus, .field select:focus { border-color: var(--accent); }
.field select option { background: var(--surface2); }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 4px;
}
.btn-primary {
  padding: 9px 22px;
  background: var(--accent);
  border: none;
  color: #fff;
  border-radius: 7px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--sans);
  transition: background .2s;
}
.btn-primary:hover { background: var(--accent2); }
.btn-secondary {
  padding: 9px 18px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text);
  border-radius: 7px;
  font-size: 13px;
  cursor: pointer;
  font-family: var(--sans);
}

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: 20px; right: 20px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 10px 16px;
  font-size: 12px;
  font-family: var(--mono);
  color: var(--text);
  opacity: 0;
  transition: opacity .25s;
  pointer-events: none;
  z-index: 200;
}
#toast.show { opacity: 1; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">work<span>plan</span></div>
  <div class="header-meta" id="header-meta">
    <span class="meta-chip">Заполните данные проекта</span>
  </div>
  <div class="header-actions">
    <button class="btn-copy" onclick="copyAsText()">📋 Копировать</button>
  </div>
</header>

<main id="main-content">
  <!-- sections rendered by JS -->
</main>

<!-- SETUP MODAL -->
<div class="modal-overlay open" id="setup-modal">
  <div class="modal">
    <div class="modal-title">Новый план работ</div>
    <div class="modal-sub">Укажите данные проекта перед началом</div>
    <div class="field">
      <label>Название проекта</label>
      <input type="text" id="s-name" placeholder="Например: Обновление AI-агента Андромеда">
    </div>
    <div class="row2">
      <div class="field">
        <label>CI стенда</label>
        <input type="text" id="s-ci-stand" placeholder="CI10508911">
      </div>
      <div class="field">
        <label>CI системы</label>
        <input type="text" id="s-ci-sys" placeholder="CI11927569 ПРОМ.">
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>Дата начала работ</label>
        <input type="date" id="s-date">
      </div>
      <div class="field">
        <label>Время начала (МСК)</label>
        <input type="time" id="s-time" value="08:00">
      </div>
    </div>
    <div class="field">
      <label>Ответственный исполнитель</label>
      <input type="text" id="s-resp" placeholder="Фамилия И.О.">
    </div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="applySetup()">Создать план →</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────
const STORAGE_KEY = 'workplan_v2';

// Section definitions — fixed structure
const SECTION_DEFS = [
  {
    id: 'prep',
    label: 'Этап 1. Подготовительные работы',
    color: '#6c63ff',
    cols: ['Работы','Дата и время начала (МСК)','Дата и время окончания (МСК)','Отв. Исполнитель','Влияние на услугу','Комментарий'],
    keys: ['task','start','end','resp','impact','comment'],
    newRow: () => ({task:'',start:'',end:'',resp:'',impact:'',comment:''})
  },
  {
    id: 'main',
    label: 'Этап 2. Основные работы',
    color: '#3b82f6',
    cols: ['Работы','Дата и время начала (МСК)','Дата и время окончания (МСК)','Отв. Исполнитель','Влияние на услугу','Комментарий'],
    keys: ['task','start','end','resp','impact','comment'],
    newRow: () => ({task:'',start:'',end:'',resp:'',impact:'',comment:''})
  },
  {
    id: 'final',
    label: 'Этап 3. Заключительные мероприятия',
    color: '#10b981',
    cols: ['Работы','Дата и время начала (МСК)','Дата и время окончания (МСК)','Отв. Исполнитель','Влияние на услугу','Комментарий'],
    keys: ['task','start','end','resp','impact','comment'],
    newRow: () => ({task:'',start:'',end:'',resp:'',impact:'',comment:''})
  },
  {
    id: 'rollback',
    label: 'План отката',
    color: '#ef4444',
    cols: ['Работы','Дата и время начала','Дата и время окончания','Отв. Исполнитель','Комментарий'],
    keys: ['task','start','end','resp','comment'],
    newRow: () => ({task:'',start:'Час X + 00:30',end:'Час X + 01:00',resp:'',comment:''})
  },
  {
    id: 'contacts',
    label: 'Контактная информация',
    color: '#f59e0b',
    cols: ['ФИО, контакт','Роль во внедрении','Контактная информация','Примечание'],
    keys: ['name','role','contact','note'],
    newRow: () => ({name:'',role:'',contact:'',note:''})
  },
  {
    id: 'comms',
    label: 'План коммуникации',
    color: '#ec4899',
    cols: ['Событие','Вид коммуникации','Средство коммуникации','Участники','Ответственный'],
    keys: ['event','type','tool','members','resp'],
    newRow: () => ({event:'',type:'',tool:'',members:'',resp:''})
  },
];

let state = {
  project: '',
  ciStand: '',
  ciSys: '',
  startDate: '',
  startTime: '',
  responsible: '',
  sections: {}
};

// default rows per section
const DEFAULT_ROWS = {
  prep: [
    {task:'Подготовка конфигурации', start:'', end:'', resp:'', impact:'', comment:''}
  ],
  main: [
    {task:'СМС рассылка о начале работ', start:'', end:'', resp:'', impact:'', comment:''},
    {task:'Включение окна обслуживания в АС Reflex', start:'', end:'', resp:'', impact:'', comment:''},
    {task:'Выполнение основных работ', start:'', end:'', resp:'', impact:'Возможна временная недоступность до 5 минут', comment:''},
    {task:'Проверка работоспособности', start:'', end:'', resp:'', impact:'', comment:''},
  ],
  final: [
    {task:'Принятие решения об успешности проведённых работ. Откат при необходимости', start:'', end:'', resp:'', impact:'', comment:''},
    {task:'Выключение окна обслуживания в АС Reflex', start:'', end:'', resp:'', impact:'', comment:''},
    {task:'СМС рассылка о завершении работ', start:'', end:'', resp:'', impact:'', comment:''},
  ],
  rollback: [
    {task:'Откат на предыдущую версию', start:'Час X + 00:30', end:'Час X + 01:00', resp:'', comment:''},
    {task:'Проверка работоспособности', start:'Час X + 00:30', end:'Час X + 00:30', resp:'', comment:''},
  ],
  contacts: [
    {name:'Телефонная конференция «11113»', role:'-', contact:'Внутренний: 855710707 № конференции: 11113', note:'Обеспечение телефонной связи между участниками'},
    {name:'', role:'', contact:'', note:''},
  ],
  comms: [
    {event:'Начало работ', type:'Рассылка SMS-сообщений, Outlook', tool:'Сервер отправки СМС, Outlook', members:'', resp:''},
    {event:'Успешное завершение работ', type:'Рассылка SMS-сообщений, Outlook', tool:'Сервер отправки СМС, Outlook', members:'', resp:''},
  ]
};

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
(function init() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      state = parsed;
      document.getElementById('setup-modal').classList.remove('open');
      render();
    } catch(e) {}
  }
  // set today in date field
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('s-date').value = today;
})();

// ─────────────────────────────────────────────
// SETUP
// ─────────────────────────────────────────────
function applySetup() {
  const name = document.getElementById('s-name').value.trim();
  const ciStand = document.getElementById('s-ci-stand').value.trim();
  const ciSys = document.getElementById('s-ci-sys').value.trim();
  const startDate = document.getElementById('s-date').value;
  const startTime = document.getElementById('s-time').value;
  const resp = document.getElementById('s-resp').value.trim();
  if (!name) { document.getElementById('s-name').focus(); return; }

  state.project = name;
  state.ciStand = ciStand;
  state.ciSys = ciSys;
  state.startDate = startDate;
  state.startTime = startTime;
  state.responsible = resp;
  // init sections with defaults
  SECTION_DEFS.forEach(s => {
    if (!state.sections[s.id]) {
      state.sections[s.id] = { collapsed: false, rows: JSON.parse(JSON.stringify(DEFAULT_ROWS[s.id] || [])) };
      // prefill resp
      if (resp) {
        state.sections[s.id].rows.forEach(r => { if (!r.resp && r.resp !== undefined) r.resp = resp; });
      }
    }
  });
  save();
  document.getElementById('setup-modal').classList.remove('open');
  render();
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function render() {
  renderHeader();
  renderSections();
}

function renderHeader() {
  const chips = [];
  if (state.project) chips.push(`<span class="meta-chip"><b>${esc(state.project)}</b></span>`);
  if (state.ciStand) chips.push(`<span class="meta-chip">CI стенда: <b>${esc(state.ciStand)}</b></span>`);
  if (state.ciSys) chips.push(`<span class="meta-chip">CI: <b>${esc(state.ciSys)}</b></span>`);
  if (state.startDate) chips.push(`<span class="meta-chip">Начало: <b>${fmtDate(state.startDate)} ${state.startTime||''}</b></span>`);
  if (state.responsible) chips.push(`<span class="meta-chip">Отв.: <b>${esc(state.responsible)}</b></span>`);
  document.getElementById('header-meta').innerHTML = chips.join('') ||
    '<span class="meta-chip">нет данных</span>';
}

function renderSections() {
  const main = document.getElementById('main-content');
  main.innerHTML = '';

  SECTION_DEFS.forEach(def => {
    const sec = state.sections[def.id];
    if (!sec) return;

    const wrap = document.createElement('div');
    wrap.className = 'section-wrap' + (sec.collapsed ? ' collapsed' : '');
    wrap.id = 'sec-' + def.id;

    // header
    wrap.innerHTML = `
      <div class="section-header" onclick="toggleSection('${def.id}')">
        <div class="section-dot" style="background:${def.color}"></div>
        <div class="section-title" style="color:${def.color}">${esc(def.label)}</div>
        <div class="section-count">${sec.rows.length} строк</div>
        <div class="section-chevron">▼</div>
      </div>
      <div class="section-body" id="body-${def.id}"></div>
    `;
    main.appendChild(wrap);

    const body = wrap.querySelector('.section-body');

    // table
    const tbl = document.createElement('table');
    tbl.innerHTML = `<thead><tr>
      <th style="width:32px">#</th>
      ${def.cols.map(c => `<th>${esc(c)}</th>`).join('')}
      <th style="width:36px"></th>
    </tr></thead><tbody id="tbody-${def.id}"></tbody>`;
    body.appendChild(tbl);

    // rows
    const tbody = tbl.querySelector('tbody');
    sec.rows.forEach((row, ri) => renderRow(def, tbody, row, ri));
    bindRowDrag(def.id, tbody);

    // add button
    const addBtn = document.createElement('button');
    addBtn.className = 'btn-add-row';
    addBtn.innerHTML = `<span style="font-size:15px;line-height:1">+</span> Добавить задачу`;
    addBtn.onclick = () => addRow(def.id);
    body.appendChild(addBtn);
  });
}

function renderRow(def, tbody, row, ri) {
  const tr = document.createElement('tr');
  tr.dataset.ri = ri;
  tr.draggable = true;

  let cells = `<td class="num">${ri + 1}</td>`;
  def.keys.forEach(k => {
    const cls = getCellClass(k);
    cells += `<td class="${cls}" contenteditable="true" data-key="${k}" data-ri="${ri}" data-sid="${def.id}">${esc(row[k] || '')}</td>`;
  });
  cells += `<td class="actions"><button class="row-del" onclick="delRow('${def.id}',${ri})">✕</button></td>`;
  tr.innerHTML = cells;

  // save on blur
  tr.querySelectorAll('[contenteditable]').forEach(td => {
    td.addEventListener('blur', () => {
      const sid = td.dataset.sid;
      const ri2 = parseInt(td.dataset.ri);
      const k = td.dataset.key;
      state.sections[sid].rows[ri2][k] = td.innerText.trim();
      save();
    });
    td.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); td.blur(); }
    });
  });

  tbody.appendChild(tr);
}

function getCellClass(k) {
  const map = {task:'task', start:'datetime', end:'datetime', resp:'resp', impact:'impact',
    comment:'comment', name:'task', role:'role', contact:'contact', note:'comment',
    event:'event', type:'comm-type', tool:'comm-type', members:'comment'};
  return map[k] || '';
}

// ─────────────────────────────────────────────
// SECTION TOGGLE
// ─────────────────────────────────────────────
function toggleSection(id) {
  state.sections[id].collapsed = !state.sections[id].collapsed;
  save();
  const wrap = document.getElementById('sec-' + id);
  wrap.classList.toggle('collapsed', state.sections[id].collapsed);
}

// ─────────────────────────────────────────────
// ROWS
// ─────────────────────────────────────────────
function addRow(sid) {
  const def = SECTION_DEFS.find(d => d.id === sid);
  const row = def.newRow();
  if (state.responsible) row.resp = state.responsible;
  state.sections[sid].rows.push(row);
  save();
  // re-render section body only
  refreshSection(sid);
}

function delRow(sid, ri) {
  state.sections[sid].rows.splice(ri, 1);
  save();
  refreshSection(sid);
}

function refreshSection(sid) {
  const def = SECTION_DEFS.find(d => d.id === sid);
  const sec = state.sections[sid];
  // update count
  const wrap = document.getElementById('sec-' + sid);
  wrap.querySelector('.section-count').textContent = sec.rows.length + ' строк';
  // re-render tbody
  const tbody = document.getElementById('tbody-' + sid);
  tbody.innerHTML = '';
  sec.rows.forEach((row, ri) => renderRow(def, tbody, row, ri));
  bindRowDrag(sid, tbody);
}

// ─────────────────────────────────────────────
// DRAG ROWS
// ─────────────────────────────────────────────
function bindRowDrag(sid, tbody) {
  let dragSrc = null;
  tbody.querySelectorAll('tr').forEach(tr => {
    tr.addEventListener('dragstart', e => {
      dragSrc = parseInt(tr.dataset.ri);
      setTimeout(() => tr.classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    tr.addEventListener('dragend', () => {
      tr.classList.remove('dragging');
      tbody.querySelectorAll('tr').forEach(r => r.classList.remove('drag-over'));
    });
    tr.addEventListener('dragover', e => {
      e.preventDefault();
      tbody.querySelectorAll('tr').forEach(r => r.classList.remove('drag-over'));
      tr.classList.add('drag-over');
    });
    tr.addEventListener('drop', e => {
      e.preventDefault();
      tr.classList.remove('drag-over');
      const toIdx = parseInt(tr.dataset.ri);
      if (dragSrc === null || dragSrc === toIdx) return;
      const rows = state.sections[sid].rows;
      const [moved] = rows.splice(dragSrc, 1);
      rows.splice(toIdx, 0, moved);
      save();
      refreshSection(sid);
      dragSrc = null;
    });
  });
}

// ─────────────────────────────────────────────
// COPY AS TEXT (for Word paste)
// ─────────────────────────────────────────────
function copyAsText() {
  let out = [];

  // title
  out.push(`ПЛАН-ГРАФИК РАБОТ`);
  if (state.project) out.push(`по ${state.project}`);
  if (state.ciStand) out.push(`(${state.ciStand})`);
  if (state.ciSys) out.push(`Стенд: ${state.ciSys}`);
  out.push('');

  SECTION_DEFS.forEach(def => {
    const sec = state.sections[def.id];
    if (!sec || sec.rows.length === 0) return;

    out.push(def.label.toUpperCase());
    out.push('');

    // header row
    const hdr = ['№', ...def.cols].join('\t');
    out.push(hdr);

    sec.rows.forEach((row, i) => {
      const cells = [String(i+1), ...def.keys.map(k => row[k] || '')];
      out.push(cells.join('\t'));
    });
    out.push('');
  });

  const text = out.join('\n');
  navigator.clipboard.writeText(text).then(() => {
    toast('Скопировано — вставьте в Word (Ctrl+V)');
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    toast('Скопировано — вставьте в Word (Ctrl+V)');
  });
}

// ─────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function fmtDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  return `${day}.${m}.${y}`;
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let _toastT;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastT);
  _toastT = setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
